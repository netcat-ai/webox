name: Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository }}
  WECHAT_DOWNLOAD_BASE: https://dldir1v6.qq.com/weixin/Universal/Linux

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      PLATFORMS: ${{ github.event_name == 'pull_request' && 'linux/amd64' || 'linux/amd64,linux/arm64' }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Download bundled WeChat packages
        shell: bash
        run: |
          set -euo pipefail

          download_package() {
            local filename="$1"
            curl \
              --fail \
              --location \
              --retry 5 \
              --retry-all-errors \
              --output "docker/wechat/${filename}" \
              "${WECHAT_DOWNLOAD_BASE}/${filename}"
            dpkg-deb --info "docker/wechat/${filename}" >/dev/null
          }

          download_package WeChatLinux_x86_64.deb
          if [[ "${PLATFORMS}" == *"linux/arm64"* ]]; then
            download_package WeChatLinux_arm64.deb
          fi

      - name: Set up QEMU
        if: env.PLATFORMS == 'linux/amd64,linux/arm64'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish image
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name != 'pull_request' && 'mode=max' || 'false' }}
          sbom: ${{ github.event_name != 'pull_request' }}
