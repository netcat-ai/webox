services:
  webox:
    build:
      context: .
      args:
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-rust:1.96-bookworm}
        DEBIAN_RUNTIME_IMAGE: ${DEBIAN_RUNTIME_IMAGE:-debian:bookworm}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        APT_DEBIAN_SECURITY_MIRROR: ${APT_DEBIAN_SECURITY_MIRROR:-}
        AGENTGATEWAY_VERSION: ${AGENTGATEWAY_VERSION:-v1.3.1}
        AGENTGATEWAY_RELEASE_URL_BASE: ${AGENTGATEWAY_RELEASE_URL_BASE:-https://github.com/agentgateway/agentgateway/releases/download}
    image: webox:local
    container_name: webox
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - WEBOX_API_TOKEN=${WEBOX_API_TOKEN:-webox}
      - WEBOX_TENANT_ID=${WEBOX_TENANT_ID:-default}
      - WEBOX_TERMINAL_TOKEN=${WEBOX_TERMINAL_TOKEN:-terminal-token}
      - WEBOX_CLIENT_TOKEN=${WEBOX_CLIENT_TOKEN:-client-token}
      - WEBOX_PROVIDER_ACCOUNT_ID=${WEBOX_PROVIDER_ACCOUNT_ID:-default}
      - WEBOX_LISTEN_ADDR=:8080
      - WEBOX_PUBLIC_BASE_URL=${WEBOX_PUBLIC_BASE_URL:-}
      - WEBOX_WEAGENT_STATE_DIR=${WEBOX_WEAGENT_STATE_DIR:-/webox/state/weagent}
      - WEBOX_MEDIA_STORE_DIR=${WEBOX_MEDIA_STORE_DIR:-/webox/state/weagent/media}
      - WEBOX_MEDIA_TRANSFER_DIR=${WEBOX_MEDIA_TRANSFER_DIR:-/webox/state/weagent/transfer}
      - WEBOX_AGENTGATEWAY_ENABLED=${WEBOX_AGENTGATEWAY_ENABLED:-1}
      - WEBOX_AGENTGATEWAY_PORT=${WEBOX_AGENTGATEWAY_PORT:-18080}
      - WEBOX_AGENTGATEWAY_ADMIN_PORT=${WEBOX_AGENTGATEWAY_ADMIN_PORT:-15000}
      - WEBOX_AGENTGATEWAY_API_BASE=${WEBOX_AGENTGATEWAY_API_BASE:-http://127.0.0.1:15000}
      - WEBOX_AGENTGATEWAY_CONFIG=${WEBOX_AGENTGATEWAY_CONFIG:-/webox/agentgateway/config.yaml}
      - WEBOX_AGENTGATEWAY_CA_PATH=${WEBOX_AGENTGATEWAY_CA_PATH:-}
      - WEBOX_WECHAT_PROXY_URL=${WEBOX_WECHAT_PROXY_URL:-http://127.0.0.1:18080}
    volumes:
      - ./data/agentgateway:/webox/agentgateway
      - ./data/state:/webox/state
      - ./data/logs:/webox/logs
    ports:
      - "${WEBOX_HTTP_PORT:-38080}:8080"
    shm_size: "1gb"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"
