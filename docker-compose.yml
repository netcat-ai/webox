services:
  webox:
    build:
      context: .
      args:
        RUST_BUILDER_IMAGE: ${RUST_BUILDER_IMAGE:-rust:1.96-bookworm}
        DEBIAN_RUNTIME_IMAGE: ${DEBIAN_RUNTIME_IMAGE:-debian:bookworm-slim}
        APT_DEBIAN_MIRROR: ${APT_DEBIAN_MIRROR:-}
        APT_DEBIAN_SECURITY_MIRROR: ${APT_DEBIAN_SECURITY_MIRROR:-}
    image: ${WEBOX_IMAGE:-webox:local}
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - RUST_LOG=${RUST_LOG:-weagent=info,tower_http=info}
      - WEBOX_API_TOKEN=${WEBOX_API_TOKEN:-}
      - WEBOX_TENANT_ID=${WEBOX_TENANT_ID:-default}
      - WEBOX_PROVIDER_ACCOUNT_ID=${WEBOX_PROVIDER_ACCOUNT_ID:-default}
      - WEBOX_LISTEN_ADDR=:8080
      - WEBOX_PUBLIC_BASE_URL=${WEBOX_PUBLIC_BASE_URL:-}
      - WEBOX_WEAGENT_STATE_DIR=${WEBOX_WEAGENT_STATE_DIR:-/webox/state/weagent}
      - WEBOX_MEDIA_STORE_DIR=${WEBOX_MEDIA_STORE_DIR:-/webox/state/weagent/media}
      - WEBOX_QR_SCREENSHOT_PATH=${WEBOX_QR_SCREENSHOT_PATH:-/webox/runtime/xvfb/Xvfb_screen0}
    volumes:
      - ./data/state:/webox/state
    ports:
      - "${WEBOX_HTTP_HOST:-127.0.0.1}:${WEBOX_HTTP_PORT:-38080}:8080"
    shm_size: "1gb"
    cap_add:
      - SYS_PTRACE
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"
