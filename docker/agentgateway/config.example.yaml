# agentgateway v1.4.0-alpha.1 config for webox.
#
# Copy this file to /webox/agentgateway/config.yaml. The entrypoint starts
# agentgateway with /webox/agentgateway as its working directory, so relative
# paths below resolve next to this config file.
config:
  adminAddr: 127.0.0.1:15000
  statsAddr: off
  readinessAddr: off
  database:
    url: sqlite://request-log.sqlite
  logging:
    level: info
    format: json
frontendPolicies:
  connect:
    mode: route
  accessLog:
    filter: "true"
    add:
      request.body: 'proxy.route.name == "webox-dynamic-https" ? request.body : null'
      response.body: 'proxy.route.name == "webox-dynamic-https" ? response.body : null'
    database:
      add:
        request.body: 'proxy.route.name == "webox-dynamic-https" ? request.body : null'
        response.body: 'proxy.route.name == "webox-dynamic-https" ? response.body : null'
binds:
- port: 18080
  listeners:
  - protocol: HTTP
    routes:
    - name: webox-mitm-connect
      hostnames:
      - httpbingo.org
      matches:
      - method: CONNECT
      backends:
      - host: 127.0.0.1:19443
    - name: webox-dynamic-connect
      matches:
      - method: CONNECT
      backends:
      - dynamic: {}
    - name: webox-dynamic-http
      backends:
      - dynamic: {}
- port: 19443
  listeners:
  - protocol: HTTPS
    tls:
      mode: dynamicCa
      cert: certificates/webox-ca.pem
      key: certificates/webox-ca-key.pem
    routes:
    - name: webox-dynamic-https
      policies:
        backendTLS: {}
      backends:
      - dynamic: {}
